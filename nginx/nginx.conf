# ============================================================
# PassGuardian - Nginx config
# Guarda este archivo en: ./nginx/nginx.conf
# ============================================================

server {
    listen 80;
    server_name _;  # Acepta cualquier dominio, ajusta si tienes uno

    # Tamaño máximo de archivos que acepta (útil para exports de contraseñas)
    client_max_body_size 10M;

    location / {
        # Redirige todo al backend Django (Gunicorn)
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Archivos estáticos de Django (si usas admin)
    location /static/ {
        alias /app/staticfiles/;
    }
}
