# ============================================================
# PassGuardian - docker-compose.yml (PRODUCCIÓN / AWS)
# ============================================================
# ⚠️  NUNCA subas el archivo .env a Git
# Crea un archivo .env en el servidor con los valores reales
# ============================================================

services:

  # ----------------------------------------
  # Base de Datos: MySQL
  # ----------------------------------------
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"     # Puedes quitar esto en producción si no necesitas acceso externo
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 30
      start_period: 180s

  # ----------------------------------------
  # Backend: Django (con Gunicorn)
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django_api
    restart: always
    expose:
      - "8000"          # Solo expuesto a Nginx, no al exterior
    environment:
      - DB_HOST=db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------
  # Nginx: Reverse Proxy
  # ----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"         # HTTP (redirige a HTTPS si usas SSL)
      - "443:443"       # HTTPS (cuando agregues certificado SSL)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend


volumes:
  db_data:
